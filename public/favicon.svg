<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Snare drum body -->
  <ellipse cx="32" cy="38" rx="20" ry="7" fill="#141414" stroke="#B8724E" stroke-width="2"/>
  <rect x="12" y="38" width="40" height="10" rx="1" fill="#1a1a1a" stroke="#B8724E" stroke-width="1.5"/>
  <ellipse cx="32" cy="48" rx="20" ry="7" fill="#141414" stroke="#B8724E" stroke-width="2"/>

  <!-- Drum head (top ellipse highlight) -->
  <ellipse cx="32" cy="38" rx="18" ry="5.5" fill="#2a2a2a"/>

  <!-- Snare wires at bottom -->
  <line x1="18" y1="48.5" x2="46" y2="48.5" stroke="#888" stroke-width="0.8"/>
  <line x1="18" y1="50" x2="46" y2="50" stroke="#888" stroke-width="0.8"/>

  <!-- Left drumstick -->
  <line x1="20" y1="16" x2="30" y2="36" stroke="#B8724E" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="20" cy="15" r="3" fill="#B8724E"/>

  <!-- Right drumstick -->
  <line x1="44" y1="16" x2="34" y2="36" stroke="#B8724E" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="44" cy="15" r="3" fill="#B8724E"/>
</svg>
